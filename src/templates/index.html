<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saideira | A rede social do boteco</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            padding: 20px;
            background-color: #d32f2f; /* Um vermelho que remete a estufa de salgado e neon */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .hero {
            padding: 80px 20px;
        }
        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 20px auto;
            color: #cccccc;
        }
        .botoes {
            margin-top: 30px;
        }
        .btn {
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0 10px;
            transition: 0.3s;
        }
        .btn-primary {
            background-color: #d32f2f;
            color: white;
        }
        .btn-primary:hover {
            background-color: #b71c1c;
        }
        .btn-secondary {
            background-color: transparent;
            color: #d32f2f;
            border: 2px solid #d32f2f;
        }
        .btn-secondary:hover {
            background-color: #d32f2f;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍻 Saideira</h1>
    </header>

    <div class="hero">
        <h2>O seu diário de botecos em Belo Horizonte</h2>
        <p>Acompanhe seus amigos, avalie a estufa, dê nota para a cerveja gelada e descubra o seu próximo bar favorito na capital mundial do boteco.</p>
        
        <div class="botoes">
            <a href="/acesso" class="btn btn-primary">Login / Criar conta</a>
            <a href="#" class="btn btn-secondary">Explorar bares</a>
        </div>
    </div>

</body>
</html>
