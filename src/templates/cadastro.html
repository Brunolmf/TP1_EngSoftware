<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta | Saideira</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #262626;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        h1 {
            margin-top: 0;
            color: #d32f2f;
        }
        form {
            display: grid;
            gap: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #111;
            color: #f4f4f4;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: #d32f2f;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .mensagem {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .erro {
            background-color: #5c1f1f;
        }
        .sucesso {
            background-color: #1f5c34;
        }
        a {
            color: #f4f4f4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Criar conta</h1>
        <p>Preencha seus dados para entrar no Saideira.</p>

        {% if erro %}
            <div class="mensagem erro">{{ erro }}</div>
        {% endif %}

        {% if sucesso %}
            <div class="mensagem sucesso">{{ sucesso }}</div>
        {% endif %}

        <form method="POST">
            <div>
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="idade">Idade</label>
                <input type="number" id="idade" name="idade" min="18" required>
            </div>

            <div>
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" minlength="8" required>
                <small>A senha deve ter pelo menos 8 caracteres, com maiuscula, minuscula, numero e simbolo.</small>
            </div>


            <button type="submit">Criar conta</button>
        </form>

        <p><a href="/">Voltar para a pagina inicial</a></p>
    </div>
</body>
</html>
