<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Novo Boteco | Saideira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --primary-amber: #d4af37;
            --text-light: #f4f4f4;
            --text-muted: #888;
            --input-bg: #0a0a0a;
            --border-color: rgba(212, 175, 55, 0.2);
            --danger: #d32f2f;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--primary-amber);
            margin: 0;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .form-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .full-width { grid-column: span 2; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            color: var(--primary-amber);
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input, select, textarea {
            background-color: var(--input-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-amber);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }

        .price-options {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .price-option {
            flex: 1;
            position: relative;
        }

        .price-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .price-label {
            display: block;
            text-align: center;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .price-option input:checked + .price-label {
            background: var(--primary-amber);
            color: #000;
            border-color: var(--primary-amber);
        }

        .actions {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: flex-end;
            border-top: 1px solid #333;
            padding-top: 30px;
        }

        .btn {
            padding: 16px 40px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-size: 1rem;
            border: none;
        }

        .btn-submit {
            background-color: var(--primary-amber);
            color: #000;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-back {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #333;
        }

        .btn-back:hover { background-color: #222; color: #fff; }

        .flash-messages { margin-bottom: 20px; }
        .msg { padding: 15px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
        .erro { background: #5c1f1f; color: white; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .header-section h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1>Novo Estabelecimento</h1>
            <p>Contribua com a comunidade registrando mais uma pérola de BH.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-messages">
              {% for category, message in messages %}
                <div class="msg {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <div class="form-card">
            <form action="{{ url_for('adicionar_bar') }}" method="POST">
                <div class="form-grid">
                    
                    <div class="form-group full-width">
                        <label for="nome">Nome do Boteco</label>
                        <input type="text" id="nome" name="nome" placeholder="Ex: Bar do Geraldo" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="endereco">Endereço Completo</label>
                        <input type="text" id="endereco" name="endereco" placeholder="Rua, Número, Bairro - Belo Horizonte" required>
                    </div>

                    <div class="form-group">
                        <label for="foto_url">URL da Foto</label>
                        <input type="url" id="foto_url" name="foto_url" placeholder="https://imagem-do-bar.jpg">
                    </div>

                    <div class="form-group">
                        <label>Faixa de Preço</label>
                        <div class="price-options">
                            <div class="price-option">
                                <input type="radio" name="faixa_de_preco" id="p1" value="$" checked>
                                <label for="p1" class="price-label" title="Barato">$</label>
                            </div>
                            <div class="price-option">
                                <input type="radio" name="faixa_de_preco" id="p2" value="$$">
                                <label for="p2" class="price-label" title="Justo">$$</label>
                            </div>
                            <div class="price-option">
                                <input type="radio" name="faixa_de_preco" id="p3" value="$$$">
                                <label for="p3" class="price-label" title="Mais caro">$$$</label>
                            </div>
                        </div>
                    </div>

                    

                </div>

                <div class="actions">
                    <a href="{{ url_for('home') }}" class="btn btn-back">Cancelar</a>
                    <button type="submit" class="btn btn-submit">Cadastrar Bar</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
