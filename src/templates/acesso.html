<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar | Saideira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-amber: #d4af37;
            --accent-bordo: #800020;
            --text-light: #f4f4f4;
            --text-muted: #b7b7b7;
            --input-bg: #111111;
            --line: rgba(212, 175, 55, 0.18);
            --danger: #5c1f1f;
            --success: #1f5c34;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-light);
            background:
                radial-gradient(circle at top left, rgba(128, 0, 32, 0.28), transparent 24%),
                linear-gradient(180deg, #171717 0%, var(--bg-color) 100%);
        }

        .wrapper {
            max-width: 520px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        }

        h1,
        h2 {
            margin-top: 0;
            font-family: 'Playfair Display', serif;
        }

        h1 {
            margin-bottom: 12px;
            color: var(--primary-amber);
            font-size: 2.4rem;
            line-height: 1.1;
        }

        h2 {
            color: var(--primary-amber);
            font-size: 1.45rem;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            line-height: 1.7;
        }

        form {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--primary-amber);
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            background-color: var(--input-bg);
            color: var(--text-light);
            font: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-amber);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.12);
        }

        button,
        .btn-link {
            display: inline-block;
            width: 100%;
            text-align: center;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        button {
            border: none;
            background-color: var(--primary-amber);
            color: var(--bg-color);
            cursor: pointer;
        }

        button:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .btn-link {
            background-color: transparent;
            color: var(--primary-amber);
            border: 1px solid var(--primary-amber);
        }

        .btn-link:hover {
            background-color: rgba(212, 175, 55, 0.08);
        }

        .secao-cadastro {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .voltar {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
        }

        .voltar:hover {
            color: var(--primary-amber);
        }

        .mensagem {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .erro {
            background-color: var(--danger);
        }

        .sucesso {
            background-color: var(--success);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h1>Entrar no Saideira</h1>
            <p>Faça login para continuar registrando seus goles favoritos.</p>

            {% if erro %}
                <div class="mensagem erro">{{ erro }}</div>
            {% endif %}

            {% if sucesso %}
                <div class="mensagem sucesso">{{ sucesso }}</div>
            {% endif %}

            <form method="POST">
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="{{ request.form.get('email', '') }}" required>
                </div>

                <div>
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>

                <button type="submit">Entrar</button>
            </form>

            <div class="secao-cadastro">
                <h2>Ainda nao tem conta?</h2>
                <p>Crie seu acesso para comecar a avaliar bares e acompanhar seus amigos.</p>
                <a href="/cadastro" class="btn-link">Criar conta</a>
            </div>

            <a href="/" class="voltar">Voltar para a pagina inicial</a>
        </div>
    </div>
</body>
</html>
